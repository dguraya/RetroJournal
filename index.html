<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>omont typewriter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#ffffff;
      font-family:'Special Elite','Courier New',monospace;
    }

    #scene {
      position:relative;
      width:100%; height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      overflow:hidden;
    }

    /*
      ARCHITECTURE:
      #paper-col  — fixed, sits from screen-top down to the slot. clips overflow.
      #paper      — absolutely inside paper-col, bottom:0, height grows upward.
      #typed-content — inside paper, padded, text renders top-to-bottom naturally.
      The paper height = lineCount * LINE_H + padding.
      Since paper is bottom-anchored, growing it pushes the top edge up.
      Text inside is always at the top of the paper, so it rises with the paper.
      The BOTTOM of the paper is always at the slot. Cursor is on the last line.
      This is physically correct: paper rises out of the slot as you type.
    */

    #paper-col {
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      width:min(520px, 92vw);
      top:0;
      /* bottom set by JS = screen-top of slot */
      background:transparent;
      overflow:hidden;
      z-index:2;
      pointer-events:none;
    }

    #paper {
      position:absolute;
      left:0; right:0;
      bottom:0;              /* always flush with slot */
      height:0px;            /* grows upward */
      background:#f5f0e8;
      box-shadow:
        3px 0 20px rgba(0,0,0,0.07),
       -3px 0 20px rgba(0,0,0,0.07),
        0 -4px 12px rgba(0,0,0,0.05);
      /* NO transition on height — instant, avoids all sync issues */
      overflow:hidden;
    }

    /* Text sits at top of paper, natural flow downward */
    #typed-content {
      position:absolute;
      top:0; left:0; right:0;
      padding:14px 2.4rem 0;
      white-space:pre-wrap;
      word-break:break-word;
      font-size:15px;
      line-height:30px;
      color:#1a0d04;
      letter-spacing:0.05em;
    }



    .char {
      display:inline;
      animation:stamp 0.07s ease-out forwards;
    }
    @keyframes stamp {
      0%  { opacity:0; transform:scale(1.18); filter:blur(0.6px); }
      40% { opacity:1; transform:scale(0.97); filter:blur(0); }
      100%{ opacity:1; transform:scale(1);    filter:blur(0); }
    }

    /* ── ARCHIVE ── */
    #archive-area {
      position:fixed;
      right:20px; top:0; bottom:0;
      width:170px;
      pointer-events:none;
      z-index:3;
      overflow:hidden;
    }

    .arc-page {
      position:absolute;
      right:0;
      width:148px;
      background:#f5f0e8;
      padding:9px 10px 12px;
      font-size:4px;
      line-height:6px;
      color:#1a0d04;
      letter-spacing:0.03em;
      white-space:pre-wrap;
      word-break:break-word;
      box-shadow:2px 3px 10px rgba(0,0,0,0.22);
      opacity:0;
      pointer-events:auto;
      transition:bottom 0.5s cubic-bezier(0.22,0.61,0.36,1),
                  opacity 0.5s,
                  transform 0.5s cubic-bezier(0.22,0.61,0.36,1);
    }
    .arc-page .arc-num {
      position:absolute;
      bottom:3px; right:6px;
      font-size:3.5px;
      color:rgba(0,0,0,0.28);
      letter-spacing:0.1em;
    }

    /* ── READ MODE ── */
    #read-overlay {
      position:fixed; inset:0;
      background:rgba(0,0,0,0);
      z-index:30;
      display:none;
      transition:background 0.35s;
      cursor:default;
    }
    #read-overlay.on { display:block; background:rgba(0,0,0,0.45); }

    #read-paper {
      position:fixed;
      left:50%;
      transform:translateX(-50%) translateY(16px);
      width:min(520px,92vw);
      background:#f5f0e8;
      box-shadow:0 30px 80px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.2);
      overflow-y:auto;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.35s cubic-bezier(0.22,0.61,0.36,1),
                  transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
      z-index:31;
      /* top / height set by JS */
    }
    #read-paper.on {
      opacity:1;
      transform:translateX(-50%) translateY(0);
      pointer-events:auto;
    }
    #read-content {
      padding:2.4rem 2.4rem 3.5rem;
      font-size:15px;
      line-height:30px;
      color:#1a0d04;
      letter-spacing:0.05em;
      white-space:pre-wrap;
      word-break:break-word;
    }
    #read-close {
      position:sticky; top:0;
      display:flex; justify-content:flex-end;
      padding:10px 14px 0;
    }
    #read-close-btn {
      font-family:'Special Elite',monospace;
      font-size:9px; letter-spacing:0.2em; text-transform:uppercase;
      color:rgba(0,0,0,0.28); background:none; border:none;
      cursor:pointer; padding:4px 8px;
      transition:color 0.2s;
    }
    #read-close-btn:hover { color:rgba(0,0,0,0.65); }

    /* ── FLASH ── */
    #flash {
      position:fixed; inset:0;
      background:#f5f0e8;
      opacity:0; pointer-events:none;
      z-index:50; transition:opacity 0.08s;
    }
    #flash.on { opacity:0.65; }

    /* ── MACHINE ── */
    #machine {
      position:relative;
      z-index:10;
      width:min(600px,98vw);
      flex-shrink:0;
      transition:transform 0.5s cubic-bezier(0.22,0.61,0.36,1), opacity 0.4s ease;
    }
    #machine.retracted { transform:translateY(115%); opacity:0; pointer-events:none; }

    #platen {
      width:min(520px,92vw);
      height:20px;
      background:linear-gradient(180deg,#2e2e2b 0%,#181816 50%,#252523 100%);
      border-radius:10px;
      margin:0 auto;
      box-shadow:0 3px 12px rgba(0,0,0,0.85),inset 0 1px 0 rgba(255,255,255,0.05);
    }
    #slot {
      width:min(490px,88vw);
      height:5px;
      background:#0c0c0b;
      margin:0 auto;
      box-shadow:inset 0 2px 5px rgba(0,0,0,1);
    }
    #keys-body {
      background:linear-gradient(180deg,#cbc7ab 0%,#b9b59b 100%);
      width:min(600px,98vw);
      border-radius:0 0 16px 16px;
      padding:16px 18px 20px;
      box-shadow:0 10px 35px rgba(0,0,0,0.7),
                 inset 0 1px 0 rgba(255,255,255,0.22),
                 inset 0 -2px 0 rgba(0,0,0,0.18);
    }
    .row { display:flex; justify-content:center; gap:5px; margin-bottom:5px; }
    .k {
      height:27px; width:30px;
      background:linear-gradient(180deg,#d6d2b6 0%,#c2be9e 100%);
      border-radius:4px;
      border:1px solid rgba(80,70,50,0.32);
      box-shadow:0 3px 0 rgba(0,0,0,0.38),inset 0 1px 0 rgba(255,255,255,0.38);
      display:flex; align-items:center; justify-content:center;
      font-size:8px; color:rgba(40,28,12,0.65);
      letter-spacing:0.02em;
      user-select:none; cursor:default;
      transition:transform 0.05s,box-shadow 0.05s;
    }
    .k.w2  { width:50px; }
    .k.w3  { width:76px; }
    .k.spc { width:190px; }
    .k.pressed {
      transform:translateY(2px);
      box-shadow:0 1px 0 rgba(0,0,0,0.38),inset 0 1px 0 rgba(255,255,255,0.28);
    }
    #brand {
      text-align:center; font-size:12px; letter-spacing:0.38em;
      color:rgba(40,28,12,0.42); margin-top:9px; text-transform:uppercase;
    }

    /* ── OVERLAYS ── */
    #hint {
      position:fixed; top:30%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; pointer-events:none;
      transition:opacity 0.7s; z-index:5;
    }
    #hint p { font-size:12px; color:rgba(0,0,0,0.18); letter-spacing:0.18em; text-transform:uppercase; }

    #stats {
      position:fixed; top:22px; right:26px;
      font-size:10px; color:rgba(0,0,0,0.25);
      letter-spacing:0.1em; line-height:1.9; text-align:right;
      z-index:20;
    }

    #hold-hint {
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      font-size:10px; letter-spacing:0.18em; color:rgba(0,0,0,0.22);
      text-transform:uppercase; white-space:nowrap;
      opacity:0; pointer-events:none; transition:opacity 0.4s; z-index:6;
    }
    #hold-hint.on { opacity:1; }

    #ding {
      position:fixed; top:26px; left:50%; transform:translateX(-50%);
      font-size:13px; color:rgba(0,0,0,0.45);
      letter-spacing:0.14em; opacity:0; transition:opacity 0.18s;
      z-index:20; pointer-events:none;
    }
    #ding.on { opacity:1; }

    #page-badge {
      position:fixed; top:26px; left:50%; transform:translateX(-50%);
      font-size:11px; letter-spacing:0.25em; color:rgba(0,0,0,0.35);
      text-transform:uppercase; pointer-events:none;
      opacity:0; transition:opacity 0.2s; z-index:20;
    }

    .splat {
      position:fixed; border-radius:50%;
      background:rgba(18,6,2,0.45); pointer-events:none;
      animation:sp 0.32s ease-out forwards;
    }
    @keyframes sp {
      0%  { transform:scale(0); opacity:0.85; }
      100%{ transform:scale(3); opacity:0; }
    }
  </style>
</head>
<body>
<div id="scene">
  <div id="hint"><p>start typing ...</p></div>

  <div id="stats">
    <div id="s-page">page 1</div>
    <div id="s-line">line 1</div>
    <div id="s-words">0 words</div>
  </div>

  <div id="ding">✦ &nbsp;ding!&nbsp; ✦</div>
  <div id="page-badge"></div>
  <div id="hold-hint">hold to read ↑</div>
  <div id="flash"></div>

  <div id="archive-area"></div>

  <div id="read-overlay"></div>
  <div id="read-paper">
    <div id="read-close"><button id="read-close-btn">release ✕</button></div>
    <div id="read-content"></div>
  </div>

  <!-- Paper col clips; paper rises from bottom -->
  <div id="paper-col">
    <div id="paper">
      <div id="typed-content"></div>
    </div>
  </div>

  <div id="machine">
    <div id="platen"></div>
    <div id="slot"></div>
    <div id="keys-body">
      <div class="row">
        <div class="k">1</div><div class="k">2</div><div class="k">3</div><div class="k">4</div>
        <div class="k">5</div><div class="k">6</div><div class="k">7</div><div class="k">8</div>
        <div class="k">9</div><div class="k">0</div><div class="k">-</div><div class="k">=</div>
        <div class="k w2">del</div>
      </div>
      <div class="row">
        <div class="k w2">tab</div>
        <div class="k">q</div><div class="k">w</div><div class="k">e</div><div class="k">r</div>
        <div class="k">t</div><div class="k">y</div><div class="k">u</div><div class="k">i</div>
        <div class="k">o</div><div class="k">p</div><div class="k">[</div><div class="k">]</div>
      </div>
      <div class="row">
        <div class="k w3">caps</div>
        <div class="k">a</div><div class="k">s</div><div class="k">d</div><div class="k">f</div>
        <div class="k">g</div><div class="k">h</div><div class="k">j</div><div class="k">k</div>
        <div class="k">l</div><div class="k">;</div><div class="k">'</div>
        <div class="k w3">return</div>
      </div>
      <div class="row">
        <div class="k w3">shift</div>
        <div class="k">z</div><div class="k">x</div><div class="k">c</div><div class="k">v</div>
        <div class="k">b</div><div class="k">n</div><div class="k">m</div><div class="k">,</div>
        <div class="k">.</div><div class="k">/</div>
        <div class="k w3">shift</div>
      </div>
      <div class="row"><div class="k spc"></div></div>
      <div id="brand">O &nbsp; M &nbsp; O &nbsp; N &nbsp; T</div>
    </div>
  </div>
</div>

<script>
  // ── ELEMENTS ──────────────────────────────────────────────────────────────
  const paperCol     = document.getElementById('paper-col');
  const paper        = document.getElementById('paper');
  const typedEl      = document.getElementById('typed-content');
  const machine      = document.getElementById('machine');
  const archiveArea  = document.getElementById('archive-area');
  const hint         = document.getElementById('hint');
  const dingEl       = document.getElementById('ding');
  const holdHint     = document.getElementById('hold-hint');
  const pageBadge    = document.getElementById('page-badge');
  const flashEl      = document.getElementById('flash');
  const readOverlay  = document.getElementById('read-overlay');
  const readPaperEl  = document.getElementById('read-paper');
  const readContent  = document.getElementById('read-content');
  const readCloseBtn = document.getElementById('read-close-btn');
  const sPage        = document.getElementById('s-page');
  const sLine        = document.getElementById('s-line');
  const sWords       = document.getElementById('s-words');

  // ── CONSTANTS ─────────────────────────────────────────────────────────────
  const LINE_H   = 30;   // px — must match CSS line-height exactly
  const COLS     = 50;   // chars before auto-wrap
  const HOLD_MS  = 320;  // ms hold-down to enter read mode
  const PAD_TOP  = 14;   // paper top padding (px)

  // ── STATE ─────────────────────────────────────────────────────────────────
  let text         = '';     // raw text on current page
  let lines        = 1;      // 1-based line count on current page
  let col          = 0;      // char position on current line
  let pageNum      = 1;
  let savedPages   = [];     // completed page texts
  let linesPerPage = 20;     // computed in layout()
  let slotY        = 0;      // screen-Y of slot top (for splats)
  let isHeld       = false;
  let holdTimer    = -1;
  let newPagePending = false;

  // ── LAYOUT ────────────────────────────────────────────────────────────────
  function layout() {
    const slotEl   = document.getElementById('slot');
    const slotRect = slotEl.getBoundingClientRect();
    slotY = slotRect.top;

    // paper-col: from screen top down to the slot top
    // This means the slot acts as the bottom edge of the paper col.
    paperCol.style.top    = '0px';
    paperCol.style.bottom = (window.innerHeight - slotY) + 'px';

    const colH = slotY; // height of paper-col

    // how many full lines fit above the slot
    linesPerPage = Math.max(3, Math.floor((colH - PAD_TOP) / LINE_H));

    // position read paper
    const fh = Math.min(colH * 0.9, window.innerHeight * 0.82);
    const ft = (window.innerHeight - fh) / 2;
    readPaperEl.style.top    = ft + 'px';
    readPaperEl.style.height = fh + 'px';

    // re-draw paper height for current line count
    syncPaperHeight();
  }

  // ── PAPER HEIGHT ──────────────────────────────────────────────────────────
  // Paper is bottom:0 inside paper-col (which clips at the slot).
  // height = PAD_TOP + lines * LINE_H
  // As height grows, the top edge rises — paper emerges from the slot.
  // NO CSS transition — instant update avoids all sync glitches.
  function syncPaperHeight() {
    paper.style.height = (PAD_TOP + lines * LINE_H) + 'px';
  }

  // ── ARCHIVE ───────────────────────────────────────────────────────────────
  function archivePage(pageText, num) {
    // Push existing archived pages upward
    const existing = archiveArea.querySelectorAll('.arc-page');
    existing.forEach(el => {
      const b = parseFloat(el.dataset.bottom || '0');
      const newB = b + 150;
      el.dataset.bottom = newB;
      el.style.bottom = newB + 'px';
      if (newB > window.innerHeight * 0.85) {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 520);
      }
    });

    const pg = document.createElement('div');
    pg.className = 'arc-page';
    const rot = (num % 2 === 0) ? 1.4 : -1.1;
    const startB = 16;
    pg.dataset.bottom = startB;
    pg.style.bottom    = startB + 'px';
    pg.style.transform = `rotate(${rot + 4}deg) translateY(40px)`;
    pg.style.opacity   = '0';
    pg.style.boxShadow = `${rot > 0 ? '2px' : '-2px'} 3px 10px rgba(0,0,0,0.22)`;

    const body = document.createTextNode(pageText);
    pg.appendChild(body);

    const numEl = document.createElement('div');
    numEl.className = 'arc-num';
    numEl.textContent = `p.${num}`;
    pg.appendChild(numEl);

    archiveArea.appendChild(pg);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      pg.style.transition = 'transform 0.5s cubic-bezier(0.22,0.61,0.36,1), opacity 0.5s';
      pg.style.transform  = `rotate(${rot}deg) translateY(0)`;
      pg.style.opacity    = '1';
    }));
  }

  // ── NEW PAGE ──────────────────────────────────────────────────────────────
  function doNewPage() {
    newPagePending = false;

    savedPages.push(text);
    archivePage(text, pageNum);

    flashEl.classList.add('on');
    setTimeout(() => flashEl.classList.remove('on'), 150);

    pageNum++;
    text  = '';
    lines = 1;
    col   = 0;

    typedEl.querySelectorAll('.char').forEach(s => s.remove());

    pageBadge.textContent = `page ${pageNum}`;
    pageBadge.style.opacity = '1';
    clearTimeout(pageBadge._t);
    pageBadge._t = setTimeout(() => { pageBadge.style.opacity = '0'; }, 1800);

    syncPaperHeight();
    updateStats();
  }

  // ── ADD CHAR ──────────────────────────────────────────────────────────────
  function addChar(ch, isNewline) {
    // insert span before the cursor so cursor stays at end
    const span       = document.createElement('span');
    span.className   = 'char';
    span.textContent = isNewline ? '\n' : ch;
    typedEl.appendChild(span);

    if (isNewline) {
      col = 0;
      lines++;
    } else {
      col++;
      if (col >= COLS) {
        col = 0;
        lines++;
        triggerDing();
      }
    }

    syncPaperHeight();

    // schedule new page after last char settles
    if (lines > linesPerPage && !newPagePending) {
      newPagePending = true;
      setTimeout(doNewPage, 80);
    }
  }

  // ── BACKSPACE ─────────────────────────────────────────────────────────────
  function doBackspace() {
    if (!text.length) return;

    const last = text[text.length - 1];
    text = text.slice(0, -1);

    const lastSpan = typedEl.querySelector('.char:last-of-type');
    if (lastSpan) lastSpan.remove();

    if (last === '\n') {
      lines = Math.max(1, lines - 1);
      // recalculate col from end of remaining text
      col = 0;
      for (let i = text.length - 1; i >= 0; i--) {
        if (text[i] === '\n') break;
        col++;
      }
      col = col % COLS;
    } else {
      if (col > 0) {
        col--;
      } else if (lines > 1) {
        lines--;
        col = COLS - 1;
      }
    }

    syncPaperHeight();
  }

  // ── DING ──────────────────────────────────────────────────────────────────
  function triggerDing() {
    dingEl.classList.add('on');
    clearTimeout(dingEl._t);
    dingEl._t = setTimeout(() => dingEl.classList.remove('on'), 950);
  }

  // ── SPLAT ─────────────────────────────────────────────────────────────────
  function splat() {
    const cx = window.innerWidth / 2;
    const cy = slotY + 2;
    for (let i = 0; i < 2; i++) {
      const s  = document.createElement('div');
      s.className = 'splat';
      const sz = 2.5 + Math.random() * 3;
      s.style.cssText =
        `width:${sz}px;height:${sz}px;` +
        `left:${cx + (Math.random() - 0.5) * 26}px;` +
        `top:${cy  + (Math.random() - 0.5) * 5}px`;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 360);
    }
  }

  // ── KEY VISUAL ────────────────────────────────────────────────────────────
  function pressKey(label) {
    for (const k of document.querySelectorAll('.k')) {
      if (k.textContent.trim().toLowerCase() === label.toLowerCase()) {
        k.classList.add('pressed');
        setTimeout(() => k.classList.remove('pressed'), 110);
        break;
      }
    }
  }

  // ── STATS ─────────────────────────────────────────────────────────────────
  function updateStats() {
    const allText = savedPages.join('') + text;
    const wc = allText.trim() ? allText.trim().split(/\s+/).length : 0;
    sPage.textContent  = `page ${pageNum}`;
    sLine.textContent  = `line ${lines}`;
    sWords.textContent = `${wc} words`;
    holdHint.classList.toggle('on', allText.length > 0);
  }

  // ── READ MODE ─────────────────────────────────────────────────────────────
  function startHold() {
    const allText = savedPages.join('') + text;
    if (!allText.length) return;
    clearTimeout(holdTimer);
    holdTimer = setTimeout(activateRead, HOLD_MS);
  }
  function cancelHold() { clearTimeout(holdTimer); }

  function activateRead() {
    if (isHeld) return;
    isHeld = true;
    readContent.textContent = text;
    readOverlay.classList.add('on');
    readPaperEl.classList.add('on');
    machine.classList.add('retracted');
  }
  function deactivateRead() {
    if (!isHeld) return;
    isHeld = false;
    readOverlay.classList.remove('on');
    readPaperEl.classList.remove('on');
    machine.classList.remove('retracted');
    readPaperEl.scrollTop = 0;
  }

  paper.addEventListener('mousedown',  startHold);
  paper.addEventListener('touchstart', e => startHold(), { passive:true });
  document.addEventListener('mouseup',  cancelHold);
  document.addEventListener('touchend', cancelHold);
  readOverlay.addEventListener('click', deactivateRead);
  readCloseBtn.addEventListener('click', deactivateRead);

  // ── KEYBOARD ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key === 'Escape') { deactivateRead(); return; }
    if (isHeld || newPagePending) { if (isHeld) deactivateRead(); return; }

    e.preventDefault();
    hint.style.opacity = '0';
    splat();

    if (e.key === 'Backspace') {
      doBackspace();
      pressKey('del');
      updateStats();
      return;
    }

    let ch = null, isNL = false;
    if (e.key === 'Enter') { ch = '\n'; isNL = true; pressKey('return'); }
    else if (e.key === ' ') { ch = ' '; }
    else if (e.key.length === 1) { ch = e.key; pressKey(e.key); }
    else return;

    text += ch;
    addChar(ch, isNL);
    updateStats();
  });

  // ── INIT ──────────────────────────────────────────────────────────────────
  window.addEventListener('load', layout);
  window.addEventListener('resize', () => { if (!isHeld) layout(); });
</script>
</body>
</html>
